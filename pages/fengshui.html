<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风水堪舆 - 天机</title>
    <link rel="stylesheet" href="../../css/page.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/interactions.css">
    <link rel="stylesheet" href="../../css/fengshui.css">
    <link rel="stylesheet" href="../../css/compass.css">
    <link rel="stylesheet" href="../../css/fortune.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☯</text></svg>">
</head>
<body>
    <script src="../js/effects/particles.js"></script>
    <script src="../../js/utils/datetime.js"></script>
    <div class="page-container">
        <header class="page-header">
            <a href="main.html" class="back-btn">← 返回</a>
            <h1 class="page-title">风水堪舆</h1>
            <div class="header-decoration"></div>
        </header>

        <main class="page-content">
            <section class="fengshui-intro">
                <div class="compass-visual" id="compassContainer">
                </div>
                <p class="intro-text">藏风聚气，得水为上</p>
            </section>

            <section class="fengshui-tools">
                <h2 class="section-title">风水工具</h2>
                <div class="tools-grid" id="toolsGrid"></div>
            </section>

            <section class="fengshui-knowledge">
                <h2 class="section-title">风水知识</h2>
                <div class="knowledge-cards" id="knowledgeCards"></div>
            </section>

            <button class="more-details-floating-btn" id="moreDetailsBtn" title="查看深度风水解析">
                <span class="btn-glow"></span>
                <span class="btn-content">
                    <span class="btn-icon">🏠</span>
                    <span class="btn-text">更多详情</span>
                </span>
            </button>
        </main>

        <footer class="page-footer">
            <p>© 2026 天机 · 风水知识仅供了解</p>
        </footer>
    </div>

    <section class="expanded-details" id="expandedDetails" style="display: none;">
        <div class="expanded-header">
            <h2>🏠 风水深度解析</h2>
            <button class="close-expanded" id="closeExpanded">×</button>
        </div>
        <div class="expanded-content" id="expandedContent">
        </div>
    </section>

    <script src="../../js/fengshui.js"></script>
