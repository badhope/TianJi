<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神话传说 - 天机</title>
    <link rel="stylesheet" href="../css/page.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/interactions.css">
    <link rel="stylesheet" href="../css/shanhai.css">
    <link rel="stylesheet" href="../css/fortune.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
</head>
<body>
    <script src="../js/effects/particles.js"></script>
    <div class="page-container">
        <header class="page-header fade-in">
            <a href="main.html" class="back-btn">← 返回</a>
            <h1 class="page-title">✨ 神话传说</h1>
            <div class="header-decoration"></div>
        </header>

        <main class="page-content">
            <section class="intro-section fade-in" style="--delay: 1">
                <p class="intro-text">追溯上古神话，了解中华民族的创世神话与传说故事</p>
            </section>

            <section class="myths-timeline fade-in" style="--delay: 2">
                <h2 class="section-title">📜 创世神话</h2>
                <div class="timeline" id="timeline"></div>
            </section>

            <section class="myths-gods fade-in" style="--delay: 3">
                <h2 class="section-title">👑 上古诸神</h2>
                <div class="gods-grid" id="godsGrid"></div>
            </section>

            <section class="myths-heroes fade-in" style="--delay: 4">
                <h2 class="section-title">🦸 传说英雄</h2>
                <div class="heroes-grid" id="heroesGrid"></div>
            </section>

            <button class="more-details-floating-btn" id="moreDetailsBtn" title="查看深度神话解析">
                <span class="btn-glow"></span>
                <span class="btn-content">
                    <span class="btn-icon">✨</span>
                    <span class="btn-text">更多详情</span>
                </span>
            </button>
        </main>

        <footer class="page-footer">
            <p>© 2026 天机 · 神话传说仅供了解</p>
        </footer>
    </div>

    <section class="expanded-details" id="expandedDetails" style="display: none;">
        <div class="expanded-header">
            <h2>✨ 神话深度解析</h2>
            <button class="close-expanded" id="closeExpanded">×</button>
        </div>
        <div class="expanded-content" id="expandedContent">
        </div>
    </section>

    <script src="../js/myths.js"></script>
</body>
</html>
