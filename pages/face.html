<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面相手相 - 天机</title>
    <link rel="stylesheet" href="../../css/page.css">
    <link rel="stylesheet" href="../../css/face.css">
    <link rel="stylesheet" href="../../css/fortune.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☯</text></svg>">
</head>
<body>
    <div class="page-container">
        <header class="page-header">
            <a href="main.html" class="back-btn">← 返回</a>
            <h1 class="page-title">面相手相</h1>
            <div class="header-decoration"></div>
        </header>

        <main class="page-content">
            <section class="face-intro">
                <p class="intro-text">相由心生，色随心变</p>
            </section>

            <section class="face-analysis">
                <h2 class="section-title">面相解读</h2>
                <div class="face-parts-grid" id="facePartsGrid"></div>
            </section>

            <section class="palm-reading">
                <h2 class="section-title">手相解析</h2>
                <div class="palm-lines-grid" id="palmLinesGrid"></div>
            </section>

            <button class="more-details-floating-btn" id="moreDetailsBtn" title="查看深度面相解析">
                <span class="btn-glow"></span>
                <span class="btn-content">
                    <span class="btn-icon">🔮</span>
                    <span class="btn-text">更多详情</span>
                </span>
            </button>
        </main>

        <footer class="page-footer">
            <p>© 2024 天机 · 相学仅供娱乐参考</p>
        </footer>
    </div>

    <section class="expanded-details" id="expandedDetails" style="display: none;">
        <div class="expanded-header">
            <h2>🔮 面相深度解析</h2>
            <button class="close-expanded" id="closeExpanded">×</button>
        </div>
        <div class="expanded-content" id="expandedContent">
        </div>
    </section>

    <script src="../../js/face.js"></script>
</body>
</html>
