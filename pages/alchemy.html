<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炼丹术 - 天机</title>
    <link rel="stylesheet" href="../css/page.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/interactions.css">
    <link rel="stylesheet" href="../css/meridians.css">
    <link rel="stylesheet" href="../css/fortune.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚗️</text></svg>">
</head>
<body>
    <script src="../js/effects/particles.js"></script>
    <div class="page-container">
        <header class="page-header">
            <a href="main.html" class="back-btn">← 返回</a>
            <h1 class="page-title">⚗️ 炼丹术</h1>
            <div class="header-decoration"></div>
        </header>

        <main class="page-content">
            <section class="intro-section">
                <p class="intro-text">探索古代炼丹术，了解外丹与内丹的奥秘</p>
            </section>

            <section class="alchemy-types">
                <h2 class="section-title">🔥 炼丹分类</h2>
                <div class="types-grid" id="typesGrid"></div>
            </section>

            <section class="elixirs-section">
                <h2 class="section-title">💊 仙丹妙药</h2>
                <div class="elixirs-grid" id="elixirsGrid"></div>
            </section>

            <section class="masters-section">
                <h2 class="section-title">👴 炼丹宗师</h2>
                <div class="masters-grid" id="mastersGrid"></div>
            </section>

            <button class="more-details-floating-btn" id="moreDetailsBtn" title="查看深度炼丹解析">
                <span class="btn-glow"></span>
                <span class="btn-content">
                    <span class="btn-icon">⚗️</span>
                    <span class="btn-text">更多详情</span>
                </span>
            </button>
        </main>

        <footer class="page-footer">
            <p>© 2026 天机 · 炼丹术仅供了解</p>
        </footer>
    </div>

    <section class="expanded-details" id="expandedDetails" style="display: none;">
        <div class="expanded-header">
            <h2>⚗️ 炼丹深度解析</h2>
            <button class="close-expanded" id="closeExpanded">×</button>
        </div>
        <div class="expanded-content" id="expandedContent">
        </div>
    </section>

    <script src="../js/alchemy.js"></script>
</body>
</html>
