<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄历查询 - 天机</title>
    <link rel="stylesheet" href="../../css/page.css">
    <link rel="stylesheet" href="../../css/calendar.css">
    <link rel="stylesheet" href="../../css/fortune.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☯</text></svg>">
</head>
<body>
    <div class="page-container">
        <header class="page-header">
            <a href="main.html" class="back-btn">← 返回</a>
            <h1 class="page-title">黄历查询</h1>
            <div class="header-decoration"></div>
        </header>

        <main class="page-content">
            <section class="date-selector">
                <div class="selector-card">
                    <div class="date-input-group">
                        <label>选择日期</label>
                        <input type="date" id="dateInput">
                    </div>
                    <button class="btn btn-primary" id="queryBtn">查询吉凶</button>
                </div>
                <div class="today-quick">
                    <button class="btn" id="todayBtn">查看今日</button>
                </div>
            </section>

            <section class="loading-section" id="loadingSection" style="display: none;">
                <div class="loading-container">
                    <div class="loading-icon">📜</div>
                    <p class="loading-text">正在推算黄历...</p>
                </div>
            </section>

            <section class="calendar-result" id="calendarResult">
                <div class="result-header">
                    <div class="result-date" id="resultDate"></div>
                    <div class="result-lunar" id="resultLunar"></div>
                </div>

                <div class="yi-ji-list">
                    <div class="yi-ji-item suitable">
                        <div class="yi-ji-header">
                            <span class="yi-ji-icon">✅</span>
                            <h3>宜</h3>
                        </div>
                        <div class="yi-ji-content" id="yiList"></div>
                    </div>
                    <div class="yi-ji-item avoid">
                        <div class="yi-ji-header">
                            <span class="yi-ji-icon">❌</span>
                            <h3>忌</h3>
                        </div>
                        <div class="yi-ji-content" id="jiList"></div>
                    </div>
                </div>

                <div class="detailed-info">
                    <div class="info-card">
                        <h4>彭祖百忌</h4>
                        <p id="pengzu"></p>
                    </div>
                    <div class="info-card">
                        <h4>神煞方位</h4>
                        <p id="shensha"></p>
                    </div>
                    <div class="info-card">
                        <h4>吉神方位</h4>
                        <p id="jishen"></p>
                    </div>
                    <div class="info-card">
                        <h4>凶神方位</h4>
                        <p id="xiongshen"></p>
                    </div>
                </div>

                <div class="hour-table">
                    <h3>时辰吉凶</h3>
                    <div class="hours-grid" id="hoursGrid"></div>
                </div>

                <div class="zodiac-match">
                    <h3>今日生肖运势</h3>
                    <div class="zodiac-row" id="zodiacRow"></div>
                </div>

                <button class="more-details-btn" id="moreDetailsBtn">
                    <span class="btn-text">更多详情</span>
                    <span class="btn-icon">📖</span>
                </button>
            </section>

            <section class="expanded-details" id="expandedDetails" style="display: none;">
                <div class="expanded-header">
                    <h2>黄历深度解析</h2>
                    <button class="close-expanded" id="closeExpanded">×</button>
                </div>
                
                <div class="expanded-content">
                    <div class="detail-section">
                        <h3>📅 五行八字分析</h3>
                        <div class="analysis-block" id="wuxingAnalysis"></div>
                    </div>
                    
                    <div class="detail-section">
                        <h3>🏠 今日宜忌详解</h3>
                        <div class="analysis-block" id="yiJiAnalysis"></div>
                    </div>
                    
                    <div class="detail-section">
                        <h3>⏰ 时辰深度解读</h3>
                        <div class="analysis-block" id="hourAnalysis"></div>
                    </div>
                    
                    <div class="detail-section">
                        <h3>🧭 方位运势分析</h3>
                        <div class="analysis-block" id="directionAnalysis"></div>
                    </div>
                    
                    <div class="detail-section">
                        <h3>💪 今日养生建议</h3>
                        <div class="analysis-block" id="healthAnalysis"></div>
                    </div>
                    
                    <div class="detail-section">
                        <h3>💼 事业财运指导</h3>
                        <div class="analysis-block" id="careerAnalysis"></div>
                    </div>
                    
                    <div class="detail-section">
                        <h3>❤️ 情感人际提示</h3>
                        <div class="analysis-block" id="loveAnalysis"></div>
                    </div>
                    
                    <div class="detail-section">
                        <h3>🔮 今日吉凶总结</h3>
                        <div class="analysis-block" id="summaryAnalysis"></div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="page-footer">
            <p>© 2024 天机 · 黄历仅供娱乐参考</p>
        </footer>
    </div>

    <script src="../../js/calendar.js"></script>
</body>
</html>
