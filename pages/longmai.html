<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙脉文化 - 天机</title>
    <link rel="stylesheet" href="../css/page.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/interactions.css">
    <link rel="stylesheet" href="../css/shanhai.css">
    <link rel="stylesheet" href="../css/fortune.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐲</text></svg>">
</head>
<body>
    <script src="../js/effects/particles.js"></script>
    <div class="page-container">
        <header class="page-header">
            <a href="main.html" class="back-btn">← 返回</a>
            <h1 class="page-title">🐲 龙脉文化</h1>
            <div class="header-decoration"></div>
        </header>

        <main class="page-content">
            <section class="intro-section">
                <p class="intro-text">探索中华龙脉，了解风水学中的山脉走势与地气运行</p>
            </section>

            <section class="main-dragons">
                <h2 class="section-title">⛰️ 三大干龙</h2>
                <div class="dragons-grid" id="dragonsGrid"></div>
            </section>

            <section class="famous-mountains">
                <h2 class="section-title">🏔️ 名山龙穴</h2>
                <div class="mountains-grid" id="mountainsGrid"></div>
            </section>

            <section class="dragon-types">
                <h2 class="section-title">🔮 龙穴类型</h2>
                <div class="types-list" id="typesList"></div>
            </section>

            <button class="more-details-floating-btn" id="moreDetailsBtn" title="查看深度龙脉解析">
                <span class="btn-glow"></span>
                <span class="btn-content">
                    <span class="btn-icon">🐲</span>
                    <span class="btn-text">更多详情</span>
                </span>
            </button>
        </main>

        <footer class="page-footer">
            <p>© 2026 天机 · 龙脉文化仅供了解</p>
        </footer>
    </div>

    <section class="expanded-details" id="expandedDetails" style="display: none;">
        <div class="expanded-header">
            <h2>🐲 龙脉深度解析</h2>
            <button class="close-expanded" id="closeExpanded">×</button>
        </div>
        <div class="expanded-content" id="expandedContent">
        </div>
    </section>

    <script src="../js/longmai.js"></script>
