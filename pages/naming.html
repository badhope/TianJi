<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姓名学 - 天机</title>
    <link rel="stylesheet" href="../css/page.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/interactions.css">
    <link rel="stylesheet" href="../css/bazi.css">
    <link rel="stylesheet" href="../css/fortune.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✍️</text></svg>">
</head>
<body>
    <script src="../js/effects/particles.js"></script>
    <div class="page-container">
        <header class="page-header fade-in">
            <a href="main.html" class="back-btn">← 返回</a>
            <h1 class="page-title">✍️ 姓名学</h1>
            <div class="header-decoration"></div>
        </header>

        <main class="page-content">
            <section class="intro-section fade-in" style="--delay: 1">
                <p class="intro-text">了解姓名学原理，解读名字中的奥秘</p>
            </section>

            <section class="theory-section fade-in" style="--delay: 2">
                <h2 class="section-title">📚 姓名学基础</h2>
                <div class="theory-grid" id="theoryGrid"></div>
            </section>

            <section class="strokes-section fade-in" style="--delay: 3">
                <h2 class="section-title">🔢 数理吉凶</h2>
                <div class="strokes-grid" id="strokesGrid"></div>
            </section>

            <section class="elements-section fade-in" style="--delay: 4">
                <h2 class="section-title">🔥 五行配置</h2>
                <div class="elements-list" id="elementsList"></div>
            </section>

            <button class="more-details-floating-btn" id="moreDetailsBtn" title="查看深度姓名学解析">
                <span class="btn-glow"></span>
                <span class="btn-content">
                    <span class="btn-icon">✍️</span>
                    <span class="btn-text">更多详情</span>
                </span>
            </button>
        </main>

        <footer class="page-footer">
            <p>© 2026 天机 · 姓名学仅供了解</p>
        </footer>
    </div>

    <section class="expanded-details" id="expandedDetails" style="display: none;">
        <div class="expanded-header">
            <h2>✍️ 姓名学深度解析</h2>
            <button class="close-expanded" id="closeExpanded">×</button>
        </div>
        <div class="expanded-content" id="expandedContent">
        </div>
    </section>

    <script src="../js/naming.js"></script>
</body>
</html>
