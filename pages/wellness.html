<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>养生导引 - 天机</title>
    <link rel="stylesheet" href="../../css/page.css">
    <link rel="stylesheet" href="../../css/wellness.css">
    <link rel="stylesheet" href="../../css/fortune.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☯</text></svg>">
</head>
<body>
    <div class="page-container">
        <header class="page-header">
            <a href="main.html" class="back-btn">← 返回</a>
            <h1 class="page-title">养生导引</h1>
            <div class="header-decoration"></div>
        </header>

        <main class="page-content">
            <section class="wellness-intro">
                <div class="intro-visual">
                    <div class="yin-yang-anim"></div>
                </div>
                <p class="intro-text">法于阴阳，和于术数</p>
            </section>

            <section class="wellness-methods">
                <h2 class="section-title">养生功法</h2>
                <div class="methods-grid" id="methodsGrid"></div>
            </section>

            <section class="seasons-care">
                <h2 class="section-title">四季养生</h2>
                <div class="seasons-grid">
                    <div class="season-card spring">
                        <div class="season-icon">🌸</div>
                        <h3>春季养生</h3>
                        <p>养肝护脾，多食辛甘</p>
                        <a href="#" class="view-more">了解更多</a>
                    </div>
                    <div class="season-card summer">
                        <div class="season-icon">☀️</div>
                        <h3>夏季养生</h3>
                        <p>养心安神，多食清淡</p>
                        <a href="#" class="view-more">了解更多</a>
                    </div>
                    <div class="season-card autumn">
                        <div class="season-icon">🍂</div>
                        <h3>秋季养生</h3>
                        <p>养肺润燥，多食酸甘</p>
                        <a href="#" class="view-more">了解更多</a>
                    </div>
                    <div class="season-card winter">
                        <div class="season-icon">❄️</div>
                        <h3>冬季养生</h3>
                        <p>养肾藏精，多食温热</p>
                        <a href="#" class="view-more">了解更多</a>
                    </div>
                </div>
            </section>

            <section class="diet-care">
                <h2 class="section-title">食疗养生</h2>
                <div class="foods-grid" id="foodsGrid"></div>
            </section>

            <button class="more-details-floating-btn" id="moreDetailsBtn" title="查看深度养生指导">
                <span class="btn-glow"></span>
                <span class="btn-content">
                    <span class="btn-icon">🧘</span>
                    <span class="btn-text">更多详情</span>
                </span>
            </button>
        </main>

        <footer class="page-footer">
            <p>© 2024 天机 · 养生知识仅供了解</p>
        </footer>
    </div>

    <section class="expanded-details" id="expandedDetails" style="display: none;">
        <div class="expanded-header">
            <h2>🧘 养生深度指导</h2>
            <button class="close-expanded" id="closeExpanded">×</button>
        </div>
        <div class="expanded-content" id="expandedContent">
        </div>
    </section>

    <script src="../../js/wellness.js"></script>
</body>
</html>
