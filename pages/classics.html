<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>典籍文献库 - 天机</title>
    <link rel="stylesheet" href="../css/page.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/interactions.css">
    <link rel="stylesheet" href="../css/shanhai.css">
    <link rel="stylesheet" href="../css/fortune.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>
<body>
    <script src="../js/effects/particles.js"></script>
    <div class="page-container">
        <header class="page-header fade-in">
            <a href="main.html" class="back-btn">← 返回</a>
            <h1 class="page-title">📚 典籍文献库</h1>
            <div class="header-decoration"></div>
        </header>

        <main class="page-content">
            <section class="intro-section fade-in" style="--delay: 1">
                <p class="intro-text">收录古代经典文献，传承中华文化智慧</p>
            </section>

            <section class="classics-section fade-in" style="--delay: 2">
                <h2 class="section-title">📜 经部典籍</h2>
                <div class="classics-grid" id="classicsGrid"></div>
            </section>

            <section class="history-section fade-in" style="--delay: 3">
                <h2 class="section-title">🏛️ 史部典籍</h2>
                <div class="history-grid" id="historyGrid"></div>
            </section>

            <section class="philosophy-section fade-in" style="--delay: 4">
                <h2 class="section-title">💭 子部典籍</h2>
                <div class="philosophy-grid" id="philosophyGrid"></div>
            </section>

            <section class="literature-section fade-in" style="--delay: 5">
                <h2 class="section-title">🎭 集部典籍</h2>
                <div class="literature-grid" id="literatureGrid"></div>
            </section>

            <button class="more-details-floating-btn" id="moreDetailsBtn" title="查看深度典籍解析">
                <span class="btn-glow"></span>
                <span class="btn-content">
                    <span class="btn-icon">📚</span>
                    <span class="btn-text">更多详情</span>
                </span>
            </button>
        </main>

        <footer class="page-footer">
            <p>© 2026 天机 · 典籍文化仅供了解</p>
        </footer>
    </div>

    <section class="expanded-details" id="expandedDetails" style="display: none;">
        <div class="expanded-header">
            <h2>📚 典籍深度解析</h2>
            <button class="close-expanded" id="closeExpanded">×</button>
        </div>
        <div class="expanded-content" id="expandedContent">
        </div>
    </section>

    <script src="../js/classics.js"></script>
</body>
</html>
