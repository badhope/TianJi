<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>气功 - 天机</title>
    <link rel="stylesheet" href="../css/page.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/interactions.css">
    <link rel="stylesheet" href="../css/meridians.css">
    <link rel="stylesheet" href="../css/fortune.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌬️</text></svg>">
</head>
<body>
    <script src="../js/effects/particles.js"></script>
    <div class="page-container">
        <header class="page-header fade-in">
            <a href="main.html" class="back-btn">← 返回</a>
            <h1 class="page-title">🌬️ 气功</h1>
            <div class="header-decoration"></div>
        </header>

        <main class="page-content">
            <section class="intro-section fade-in" style="--delay: 1">
                <p class="intro-text">学习中华气功，强身健体、延年益寿</p>
            </section>

            <section class="qigong-types fade-in" style="--delay: 2">
                <h2 class="section-title">🔄 气功分类</h2>
                <div class="types-grid" id="typesGrid"></div>
            </section>

            <section class="practice-section fade-in" style="--delay: 3">
                <h2 class="section-title">🧘 修炼方法</h2>
                <div class="practice-grid" id="practiceGrid"></div>
            </section>

            <section class="effects-section fade-in" style="--delay: 4">
                <h2 class="section-title">✨ 功效作用</h2>
                <div class="effects-list" id="effectsList"></div>
            </section>

            <button class="more-details-floating-btn" id="moreDetailsBtn" title="查看深度气功解析">
                <span class="btn-glow"></span>
                <span class="btn-content">
                    <span class="btn-icon">🌬️</span>
                    <span class="btn-text">更多详情</span>
                </span>
            </button>
        </main>

        <footer class="page-footer">
            <p>© 2026 天机 · 气功修炼仅供了解</p>
        </footer>
    </div>

    <section class="expanded-details" id="expandedDetails" style="display: none;">
        <div class="expanded-header">
            <h2>🌬️ 气功深度解析</h2>
            <button class="close-expanded" id="closeExpanded">×</button>
        </div>
        <div class="expanded-content" id="expandedContent">
        </div>
    </section>

    <script src="../js/qigong.js"></script>
</body>
</html>
