<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易经详解 - 天机</title>
    <link rel="stylesheet" href="../css/page.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/interactions.css">
    <link rel="stylesheet" href="../css/yijing.css">
    <link rel="stylesheet" href="../css/fortune.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☯</text></svg>">
</head>
<body>
    <script src="../js/effects/particles.js"></script>
    <div class="page-container">
        <header class="page-header fade-in">
            <a href="main.html" class="back-btn">← 返回</a>
            <h1 class="page-title">☯ 易经详解</h1>
            <div class="header-decoration"></div>
        </header>

        <main class="page-content">
            <section class="intro-section fade-in" style="--delay: 1">
                <p class="intro-text">深入学习易经六十四卦，探索变化之道</p>
            </section>

            <section class="trigrams-section fade-in" style="--delay: 2">
                <h2 class="section-title">☰ 八卦详解</h2>
                <div class="trigrams-grid" id="trigramsGrid"></div>
            </section>

            <section class="hexagrams-section fade-in" style="--delay: 3">
                <h2 class="section-title">🔮 六十四卦</h2>
                <div class="hexagrams-list" id="hexagramsList"></div>
            </section>

            <section class="theory-section fade-in" style="--delay: 4">
                <h2 class="section-title">📚 易理探讨</h2>
                <div class="theory-grid" id="theoryGrid"></div>
            </section>

            <button class="more-details-floating-btn" id="moreDetailsBtn" title="查看深度易经解析">
                <span class="btn-glow"></span>
                <span class="btn-content">
                    <span class="btn-icon">☯</span>
                    <span class="btn-text">更多详情</span>
                </span>
            </button>
        </main>

        <footer class="page-footer">
            <p>© 2026 天机 · 易经文化仅供了解</p>
        </footer>
    </div>

    <section class="expanded-details" id="expandedDetails" style="display: none;">
        <div class="expanded-header">
            <h2>☯ 易经深度解析</h2>
            <button class="close-expanded" id="closeExpanded">×</button>
        </div>
        <div class="expanded-content" id="expandedContent">
        </div>
    </section>

    <script src="../js/yijing-detail.js"></script>
</body>
</html>
