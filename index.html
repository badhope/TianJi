<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天机 - 玄学入口</title>
    <link rel="stylesheet" href="css/entrance.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☯</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="entrance-container" id="entranceContainer">
        <canvas id="cosmosCanvas"></canvas>
        <canvas id="particlesCanvas"></canvas>
        <canvas id="nebulaCanvas"></canvas>
        
        <div class="celestial-belt" id="celestialBelt">
            <div class="star-orbit orbit1"></div>
            <div class="star-orbit orbit2"></div>
            <div class="star-orbit orbit3"></div>
            <div class="celestial-body sun"></div>
            <div class="celestial-body moon"></div>
            <div class="celestial-body star star1">✦</div>
            <div class="celestial-body star star2">✧</div>
            <div class="celestial-body star star3">★</div>
        </div>
        
        <div class="taiji-container" id="taiji">
            <div class="taiji">
                <div class="yin"></div>
                <div class="yang"></div>
                <div class="symbol-yin">☽</div>
                <div class="symbol-yang">☀</div>
                <div class="taiji-ring"></div>
                <div class="taiji-ring ring2"></div>
                <div class="taiji-ring ring3"></div>
            </div>
            <div class="trigrams">
                <div class="trigram" data-value="☰">☰</div>
                <div class="trigram" data-value="☱">☱</div>
                <div class="trigram" data-value="☲">☲</div>
                <div class="trigram" data-value="☳">☳</div>
                <div class="trigram" data-value="☴">☴</div>
                <div class="trigram" data-value="☵">☵</div>
                <div class="trigram" data-value="☶">☶</div>
                <div class="trigram" data-value="☷">☷</div>
            </div>
            <div class="energy-field"></div>
        </div>
        
        <div class="title-container">
            <h1 class="title" id="title">
                <span class="char" data-char="天">天</span>
                <span class="char" data-char="机">机</span>
            </h1>
            <p class="subtitle">
                <span class="sub-char">探</span>
                <span class="sub-char">索</span>
                <span class="sub-char">玄</span>
                <span class="sub-char">妙</span>
                <span class="sub-char">·</span>
                <span class="sub-char">洞</span>
                <span class="sub-char">察</span>
                <span class="sub-char">天</span>
                <span class="sub-char">机</span>
            </p>
            <div class="fengshui-compass">
                <div class="compass-needle"></div>
                <div class="compass-mark n">北</div>
                <div class="compass-mark s">南</div>
                <div class="compass-mark e">东</div>
                <div class="compass-mark w">西</div>
            </div>
        </div>
        
        <div class="enter-hint" id="enterHint">
            <div class="hint-orbit">
                <div class="hint-planet"></div>
            </div>
            <span>点击进入</span>
            <div class="pulse-ring"></div>
            <div class="pulse-ring ring2"></div>
            <div class="pulse-ring ring3"></div>
        </div>
        
        <div class="runes-container" id="runesContainer">
            <span class="rune">☰</span>
            <span class="rune">☵</span>
            <span class="rune">☶</span>
            <span class="rune">☴</span>
            <span class="rune">☲</span>
            <span class="rune">☳</span>
            <span class="rune">☱</span>
            <span class="rune">☷</span>
            <span class="rune">乾</span>
            <span class="rune">坤</span>
            <span class="rune">震</span>
            <span class="rune">巽</span>
            <span class="rune">坎</span>
            <span class="rune">离</span>
            <span class="rune">艮</span>
            <span class="rune">兑</span>
        </div>
        
        <div class="corner-decorations">
            <div class="corner tl">
                <div class="corner-pattern"></div>
            </div>
            <div class="corner tr">
                <div class="corner-pattern"></div>
            </div>
            <div class="corner bl">
                <div class="corner-pattern"></div>
            </div>
            <div class="corner br">
                <div class="corner-pattern"></div>
            </div>
        </div>
        
        <div class="bottom-info">
            <div class="info-item">
                <span class="info-icon">☯</span>
                <span class="info-text">阴阳平衡</span>
            </div>
            <div class="info-item">
                <span class="info-icon">☰</span>
                <span class="info-text">八卦变化</span>
            </div>
            <div class="info-item">
                <span class="info-icon">★</span>
                <span class="info-text">五星运行</span>
            </div>
        </div>
    </div>

    <script src="js/entrance.js"></script>
</body>
</html>
